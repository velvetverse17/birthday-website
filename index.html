<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>✨ cinematic birthday · reel of love</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0b0b;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      color: #fff;
    }
    .scene {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.4s cubic-bezier(0.23, 1, 0.32, 1), transform 1.4s cubic-bezier(0.23, 1, 0.32, 1);
      transform: scale(0.94) translateY(12px);
      backface-visibility: hidden;
      will-change: transform, opacity;
      padding: 1.5rem;
      text-align: center;
      z-index: 1;
    }
    .scene.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1) translateY(0);
      z-index: 10;
    }
    .scene.exit {
      opacity: 0;
      transform: scale(1.04) translateY(-24px);
      pointer-events: none;
      z-index: 5;
    }

    /* ---- glassmorphism ---- */
    .glass {
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      background: rgba(20, 8, 8, 0.3);
      border: 1px solid rgba(255, 200, 200, 0.10);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.7);
      border-radius: 48px;
      padding: 2.4rem 3rem;
    }

    .btn {
      background: rgba(200, 40, 60, 0.25);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255, 180, 180, 0.30);
      padding: 1rem 3rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 1.4rem;
      letter-spacing: 0.04em;
      color: #fff5f0;
      box-shadow: 0 8px 36px rgba(200, 30, 50, 0.3);
      transition: all 0.3s ease;
      cursor: pointer;
      margin-top: 2rem;
    }
    .btn:hover {
      transform: scale(1.04);
      background: rgba(220, 50, 70, 0.4);
      border-color: rgba(255, 180, 180, 0.7);
      box-shadow: 0 0 50px #ff335580;
    }
    .btn:active { transform: scale(0.94); }

    input {
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(6px);
      border: 1.5px solid rgba(255, 180, 180, 0.25);
      border-radius: 60px;
      padding: 1rem 2rem;
      font-size: 1.3rem;
      color: #fff5ee;
      text-align: center;
      width: 280px;
      max-width: 80%;
      outline: none;
      transition: 0.3s;
    }
    input:focus {
      border-color: #ff6670;
      box-shadow: 0 0 40px #ff446680;
    }

    .typing-cursor {
      display: inline-block;
      width: 3px;
      height: 1.2em;
      background: #ffa5a5;
      margin-left: 6px;
      animation: blink 0.9s infinite;
    }
    @keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0.15; } }

    .heartbeat {
      animation: heartbeat 1.8s ease-in-out infinite;
    }
    @keyframes heartbeat { 0%,100%{ transform: scale(1); } 14%{ transform: scale(1.10); } 28%{ transform: scale(1); } 42%{ transform: scale(1.07); } 56%{ transform: scale(1); } }

    .sparkle {
      position: absolute;
      width: 7px;
      height: 7px;
      background: #fffbe6;
      box-shadow: 0 0 30px #ffb0b0, 0 0 80px #ff4466;
      border-radius: 50%;
      pointer-events: none;
    }

    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 22px;
      border-radius: 4px;
      opacity: 0.95;
      pointer-events: none;
    }

    /* letter */
    .letter-paper {
      background: #fbf3e8;
      color: #1e0e0a;
      padding: 2.4rem 3rem;
      border-radius: 24px 8px 24px 8px;
      max-width: 560px;
      width: 90%;
      box-shadow: 0 30px 90px rgba(0,0,0,0.8), 0 0 0 1px #f5d9c4 inset;
      transform: rotate(-0.4deg);
      font-family: 'Georgia', serif;
      line-height: 1.7;
      font-size: 1.2rem;
      text-align: left;
    }
    .letter-paper p { margin: 0.7rem 0; }

    /* gift */
    .gift-box {
      width: 180px;
      height: 200px;
      background: linear-gradient(145deg, #b31b2b, #7a0f1a);
      border-radius: 24px 24px 12px 12px;
      box-shadow: 0 20px 60px #aa2233aa, 0 0 90px #ff335580;
      position: relative;
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: bottom;
      cursor: default;
    }
    .gift-box.shake {
      animation: shake 0.5s ease-in-out 3;
    }
    @keyframes shake {
      0%,100% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(7deg) scale(1.03); }
      75% { transform: rotate(-7deg) scale(1.03); }
    }
    .gift-lid {
      width: 200px;
      height: 40px;
      background: linear-gradient(145deg, #d42a3e, #9e1325);
      border-radius: 20px 20px 0 0;
      position: absolute;
      top: -20px;
      left: -10px;
      box-shadow: 0 -10px 30px #ff4466;
      transition: 0.5s cubic-bezier(0.34, 1.5, 0.64, 1);
      transform-origin: bottom;
    }
    .gift-box.open .gift-lid {
      transform: translateY(-100px) rotate(14deg);
      opacity: 0.5;
    }
    .gift-box.open {
      transform: scale(0.88) rotate(2deg);
      box-shadow: 0 0 140px #ff5570;
    }
    .glow-ring {
      position: absolute;
      inset: -20px;
      border-radius: 40px;
      background: radial-gradient(circle, #ff4470aa, transparent 70%);
      filter: blur(30px);
      opacity: 0.4;
      pointer-events: none;
    }

    /* scene backgrounds */
    #scene1 { background: #0b0b0b; }
    #scene2 { background: radial-gradient(circle at 30% 20%, #2a0a0a, #0d0101); }
    #scene3 { background: radial-gradient(circle at 70% 30%, #2d0505, #0a0000); }
    #scene4 { background: #1a0808; }
    #scene5 { background: #120303; }
    #scene6 { background: #0d0202; }
    #scene7 { background: radial-gradient(circle at 50% 40%, #3b0a12, #0a0000); }

    .big-heart {
      font-size: 10rem;
      filter: drop-shadow(0 0 70px #ff2255);
      animation: heartbeat 1.8s ease-in-out infinite;
    }

    .letter-line {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .letter-line.show {
      opacity: 1;
      transform: translateY(0);
    }

    .password-box {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(14px);
      padding: 2.8rem 2.4rem;
      border-radius: 60px;
      border: 1px solid #ff4466aa;
      box-shadow: 0 0 90px #ff335530;
    }
    .lock-icon {
      font-size: 3.6rem;
      filter: drop-shadow(0 0 40px #ff4466);
    }

    .final-text {
      font-size: clamp(2.8rem, 13vw, 5.8rem);
      font-weight: 600;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #ffe3e0, #ffa5a5, #ff7080);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 70px #ff3355aa;
      animation: glowPulse 3s infinite alternate;
    }
    @keyframes glowPulse { 0%{ filter: drop-shadow(0 0 20px #ff3355); } 100%{ filter: drop-shadow(0 0 90px #ff6680); } }

    .particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* floating hearts container */
    .floating-heart {
      position: fixed;
      pointer-events: none;
      z-index: 2;
      font-size: 1.8rem;
      opacity: 0.25;
      transition: transform 6s linear, opacity 6s linear;
    }
  </style>
</head>
<body>

<canvas id="particleCanvas" class="particle-canvas"></canvas>

<!-- SCENES -->
<div id="scene1" class="scene active">
  <div style="position:relative; z-index:2;">
    <h1 style="font-size: clamp(3.4rem, 14vw, 6.8rem); font-weight: 300; letter-spacing: 8px; opacity:0; animation: fadeIn 2.6s ease forwards; text-shadow: 0 0 70px #ff4d6d;">Happy Birthday ❤️</h1>
  </div>
</div>

<div id="scene2" class="scene">
  <div class="glass" style="max-width:720px; padding:3rem 2.4rem;">
    <div style="font-size:2.2rem; font-weight:300; line-height:1.6; letter-spacing:0.02em;">
      <span id="typeLine1" style="display:inline-block;"></span><span class="typing-cursor" id="cursor1"></span>
      <div style="height:1.6rem;"></div>
      <span id="typeLine2" style="display:inline-block;"></span><span class="typing-cursor" id="cursor2" style="display:none;"></span>
    </div>
  </div>
</div>

<div id="scene3" class="scene">
  <div style="display:flex; flex-direction:column; align-items:center;">
    <div class="gift-box" id="giftBox">
      <div class="glow-ring"></div>
      <div class="gift-lid"></div>
      <div style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:gold; width:30px; height:12px; border-radius:20px; box-shadow:0 0 30px #ffbb33;"></div>
      <div style="position:absolute; top:40px; left:50%; transform:translateX(-50%); width:12px; height:60px; background:gold; box-shadow:0 0 20px #ffbb33;"></div>
    </div>
    <button class="btn" id="openGiftBtn">🎁 Open Gift</button>
  </div>
</div>

<div id="scene4" class="scene">
  <div class="letter-paper" id="letterPaper">
    <p style="font-weight:600; font-size:1.6rem; color:#b02a3a;">My Dearest,</p>
    <p id="letterLine1" class="letter-line">Every day with you is a beautiful page.</p>
    <p id="letterLine2" class="letter-line">Today, the world celebrates your light.</p>
    <p id="letterLine3" class="letter-line">You are the poetry my heart keeps writing.</p>
    <p id="letterLine4" class="letter-line" style="font-style:italic; color:#a0364a;">— forever yours,</p>
  </div>
</div>

<div id="scene5" class="scene">
  <div style="display:flex; flex-direction:column; align-items:center;">
    <div class="big-heart">❤️</div>
    <div style="margin-top:1.8rem; font-size:1.8rem; font-weight:300; letter-spacing:2px; background:rgba(0,0,0,0.4); padding:0.8rem 2.4rem; border-radius:60px; backdrop-filter:blur(8px);">
      <span id="wishText" style="display:inline-block;">✨</span>
    </div>
  </div>
</div>

<div id="scene6" class="scene">
  <div class="password-box">
    <div class="lock-icon">🔐</div>
    <h3 style="font-weight:300; margin:0.8rem 0 1.4rem; letter-spacing:2px;">enter the secret</h3>
    <input type="text" id="passwordInput" placeholder="type here..." autocomplete="off">
    <button class="btn" id="unlockBtn" style="margin-top:1.8rem;">Unlock ❤️</button>
    <p id="lockMsg" style="margin-top:1.2rem; min-height:2.4rem; font-weight:300; color:#ffb0b0;"></p>
  </div>
</div>

<div id="scene7" class="scene">
  <div style="position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%;">
    <div style="position:absolute; inset:0; background: radial-gradient(circle at 30% 40%, #ff446622, transparent 60%);"></div>
    <div class="final-text" style="position:relative; z-index:4;">I love you sooo sooo sooooo much ❤️</div>
    <div style="margin-top:2.4rem; font-size:1.8rem; opacity:0.8; letter-spacing:8px; filter:drop-shadow(0 0 50px #ff4466);">✨ always & forever ✨</div>
  </div>
</div>

<script>
  (function(){
    // ---------- PARTICLE SYSTEM ----------
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    function resize() { width=canvas.width=window.innerWidth; height=canvas.height=window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();

    const particles = [];
    for(let i=0;i<70;i++){
      particles.push({
        x: Math.random()*width, y: Math.random()*height,
        r: Math.random()*3.5+1.2,
        dx: (Math.random()-0.5)*0.5,
        dy: (Math.random()-0.5)*0.5,
        o: Math.random()*0.4+0.1
      });
    }

    function drawParticles() {
      ctx.clearRect(0,0,width,height);
      particles.forEach(p=>{
        p.x += p.dx;
        p.y += p.dy;
        if(p.x<0 || p.x>width) p.dx *= -1;
        if(p.y<0 || p.y>height) p.dy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255, 200, 210, ${p.o})`;
        ctx.shadowColor = '#ff4466';
        ctx.shadowBlur = 24;
        ctx.fill();
      });
      requestAnimationFrame(drawParticles);
    }
    drawParticles();

    // ---------- FLOATING HEARTS (ambient) ----------
    function spawnFloatingHeart() {
      const heart = document.createElement('div');
      heart.className = 'floating-heart';
      heart.textContent = '❤️';
      heart.style.left = (Math.random() * 90 + 5) + '%';
      heart.style.bottom = '-10%';
      heart.style.fontSize = (Math.random() * 28 + 18) + 'px';
      heart.style.opacity = (Math.random() * 0.25 + 0.08);
      document.body.appendChild(heart);
      requestAnimationFrame(() => {
        heart.style.transform = `translateY(-${window.innerHeight + 120}px) rotate(${Math.random() * 50 - 25}deg)`;
        heart.style.opacity = '0';
      });
      setTimeout(() => heart.remove(), 7500);
    }
    setInterval(spawnFloatingHeart, 800);

    // ---------- SCENE MANAGEMENT ----------
    const scenes = document.querySelectorAll('.scene');
    let currentScene = 0;
    let isTransitioning = false;

    function goToScene(index) {
      if (isTransitioning || index === currentScene) return;
      if (index < 0 || index >= scenes.length) return;
      isTransitioning = true;
      const prev = scenes[currentScene];
      const next = scenes[index];
      prev.classList.remove('active');
      prev.classList.add('exit');
      setTimeout(() => { prev.classList.remove('exit'); }, 1400);
      next.classList.remove('exit');
      next.classList.add('active');
      currentScene = index;
      setTimeout(() => { isTransitioning = false; }, 1400);

      // Trigger scene-specific actions
      if (index === 4) showLetterLines();
      if (index === 5) animateWishes();
      if (index === 7) triggerFinalSparkles();
    }

    // ---------- SCENE 1 → 2 ----------
    setTimeout(() => { goToScene(1); }, 4400);

    // ---------- SCENE 2 TYPING ----------
    const line1 = "Today isn’t just another day…";
    const line2 = "You were born to make someone’s world beautiful.";
    let typeIndex1 = 0, typeIndex2 = 0;
    let typeDone1 = false, typeDone2 = false;
    let typingStarted = false;

    function typeScene2() {
      if (typingStarted) return;
      typingStarted = true;
      const el1 = document.getElementById('typeLine1');
      const el2 = document.getElementById('typeLine2');
      const cursor1 = document.getElementById('cursor1');
      const cursor2 = document.getElementById('cursor2');

      function typeNext() {
        if (!typeDone1) {
          if (typeIndex1 < line1.length) {
            el1.textContent += line1[typeIndex1++];
            setTimeout(typeNext, 58);
          } else {
            typeDone1 = true;
            cursor1.style.display = 'none';
            cursor2.style.display = 'inline-block';
            setTimeout(typeNext, 500);
          }
        } else if (!typeDone2) {
          if (typeIndex2 < line2.length) {
            el2.textContent += line2[typeIndex2++];
            setTimeout(typeNext, 48);
          } else {
            typeDone2 = true;
            cursor2.style.display = 'none';
            setTimeout(() => { goToScene(2); }, 1400);
          }
        }
      }
      typeNext();
    }

    // Watch for scene2 activation
    const scene2Observer = new MutationObserver(() => {
      if (scenes[1].classList.contains('active') && !typingStarted) {
        typeScene2();
        scene2Observer.disconnect();
      }
    });
    scene2Observer.observe(scenes[1], { attributes: true, attributeFilter: ['class'] });

    // ---------- SCENE 3 GIFT ----------
    const giftBox = document.getElementById('giftBox');
    const openBtn = document.getElementById('openGiftBtn');
    let giftOpened = false;

    openBtn.addEventListener('click', () => {
      if (giftOpened) return;
      giftOpened = true;
      giftBox.classList.add('shake');
      setTimeout(() => {
        giftBox.classList.remove('shake');
        giftBox.classList.add('open');

        // Confetti burst
        for (let i = 0; i < 100; i++) {
          const c = document.createElement('div');
          c.className = 'confetti-piece';
          c.style.left = (40 + Math.random() * 20) + '%';
          c.style.top = (30 + Math.random() * 30) + '%';
          c.style.background = `hsl(${Math.random() * 360}, 85%, 70%)`;
          c.style.transform = `rotate(${Math.random() * 360}deg)`;
          c.style.position = 'fixed';
          c.style.zIndex = '99';
          c.style.transition = 'all 2.8s cubic-bezier(0.23,1,0.32,1)';
          document.body.appendChild(c);
          requestAnimationFrame(() => {
            c.style.transform = `translate(${(Math.random() - 0.5) * 500}px, ${(Math.random() - 0.5) * 500}px) rotate(${Math.random() * 720}deg)`;
            c.style.opacity = '0';
          });
          setTimeout(() => c.remove(), 3200);
        }

        setTimeout(() => { goToScene(3); }, 1800);
      }, 800);
    });

    // ---------- SCENE 4 LETTER LINES ----------
    function showLetterLines() {
      const lines = document.querySelectorAll('.letter-line');
      lines.forEach((el, i) => {
        setTimeout(() => { el.classList.add('show'); }, i * 420 + 300);
      });
      setTimeout(() => { goToScene(4); }, 3200);
    }

    // ---------- SCENE 5 WISHES ----------
    const wishes = ["You are magic ✨", "Beautiful soul ❤️", "Forever loved", "My sunshine ☀️", "Endless joy", "You complete me"];
    let wishIndex = 0;

    function animateWishes() {
      const el = document.getElementById('wishText');
      if (wishIndex < wishes.length) {
        el.style.opacity = '0';
        el.style.transform = 'scale(0.6)';
        setTimeout(() => {
          el.textContent = wishes[wishIndex++];
          el.style.transition = 'all 0.6s cubic-bezier(0.34,1.56,0.64,1)';
          el.style.opacity = '1';
          el.style.transform = 'scale(1)';
          setTimeout(animateWishes, 1400);
        }, 200);
      } else {
        setTimeout(() => { goToScene(5); }, 1200);
      }
    }

    // ---------- SCENE 6 PASSWORD ----------
    document.getElementById('unlockBtn').addEventListener('click', () => {
      const input = document.getElementById('passwordInput');
      const msg = document.getElementById('lockMsg');
      const val = input.value.trim();
      if (val.toLowerCase() === 'i love you') {
        msg.style.color = '#9bff9b';
        msg.textContent = '❤️ perfect ❤️';
        setTimeout(() => { goToScene(6); }, 1200);
      } else {
        msg.style.color = '#ff8888';
        msg.textContent = '💔 try again, love 💔';
        setTimeout(() => { msg.textContent = ''; }, 2000);
      }
    });
    document.getElementById('passwordInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('unlockBtn').click();
    });

    // ---------- SCENE 7 FINAL SPARKLES ----------
    function triggerFinalSparkles() {
      for (let i = 0; i < 60; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.style.left = (Math.random() * 100) + '%';
        s.style.top = (Math.random() * 100) + '%';
        s.style.width = (Math.random() * 10 + 2) + 'px';
        s.style.height = s.style.width;
        s.style.background = `radial-gradient(circle, #fff, #ff7799)`;
        s.style.position = 'fixed';
        s.style.zIndex = '50';
        s.style.pointerEvents = 'none';
        s.style.animation = `sparkleAnim ${Math.random() * 2.5 + 2}s ease-in-out infinite`;
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 4500);
      }
    }

    // Inject sparkle keyframe
    const styleSheet = document.createElement('style');
    styleSheet.textContent = `
      @keyframes sparkleAnim {
        0% { opacity:0; transform:scale(0) rotate(0deg); }
        50% { opacity:1; transform:scale(1.8) rotate(180deg); }
        100% { opacity:0; transform:scale(0) rotate(360deg); }
      }
      @keyframes fadeIn {
        0% { opacity:0; transform:scale(0.92); }
        100% { opacity:1; transform:scale(1); }
      }
    `;
    document.head.appendChild(styleSheet);

    // ---------- ENSURE SCENE 1 ACTIVE ON LOAD ----------
    window.addEventListener('load', () => {
      scenes.forEach((s, i) => {
        if (i === 0) s.classList.add('active');
        else s.classList.remove('active');
      });
    });

    // ---------- AUTO-PLAY MUSIC (placeholder) ----------
    // Uncomment and add your music URL if needed
    /*
    const audio = new Audio('https://example.com/music.mp3');
    audio.loop = true;
    audio.volume = 0.5;
    document.addEventListener('click', () => { audio.play(); }, { once: true });
    */

  })();
</script>
</body>
</html>
