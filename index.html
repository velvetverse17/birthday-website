<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>Cinematic Birthday ✦ Love</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0000;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      position: fixed;
      top: 0;
      left: 0;
      touch-action: pan-x pan-y; 
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* main cinematic stage */
    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 450px;
      max-height: 900px;
      overflow: hidden;
      background: radial-gradient(circle at center, #1a0505 0%, #020000 100%);
      box-shadow: 0 0 80px rgba(180, 50, 70, 0.3);
      border-radius: 0;
    }

    @media (min-width: 768px) {
      .stage {
        border-radius: 48px;
        max-height: 850px;
        box-shadow: 0 30px 80px rgba(0,0,0,0.9), 0 0 120px rgba(200, 40, 60, 0.4);
      }
    }

    .scene {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      transition: opacity 0.8s cubic-bezier(0.23, 1, 0.32, 1), transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
      opacity: 0;
      pointer-events: none;
      transform: scale(0.98);
      background: transparent;
      backdrop-filter: blur(0px);
    }

    .scene.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
      backdrop-filter: blur(0px);
    }

    /* luxury glass elements */
    .glass-card {
      background: rgba(20, 5, 5, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(220, 140, 120, 0.25);
      border-radius: 42px;
      box-shadow: 0 25px 50px -8px rgba(0,0,0,0.8), 0 0 0 1px rgba(180, 70, 80, 0.3), inset 0 0 30px rgba(255, 180, 160, 0.2);
      padding: 32px 24px;
    }

    .btn-luxury {
      background: linear-gradient(145deg, #3d0a0f 0%, #1f0305 100%);
      border: 1px solid rgba(210, 120, 110, 0.7);
      color: #f7d7cf;
      padding: 16px 36px;
      border-radius: 60px;
      font-weight: 500;
      letter-spacing: 2px;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px -5px rgba(180, 40, 60, 0.6), 0 0 25px rgba(255, 100, 100, 0.5);
      transition: all 0.4s ease;
      cursor: pointer;
      font-size: 1.1rem;
      text-transform: uppercase;
    }

    .btn-luxury:active {
      transform: scale(0.94);
      background: #5c1a20;
      box-shadow: 0 0 45px #d44c5c;
    }

    input {
      background: rgba(10, 0, 0, 0.7);
      border: 1px solid rgba(200, 130, 120, 0.7);
      border-radius: 50px;
      padding: 16px 24px;
      color: #ffe9e0;
      font-size: 1.2rem;
      text-align: center;
      backdrop-filter: blur(15px);
      outline: none;
      width: 100%;
      box-shadow: 0 0 25px rgba(180, 50, 50, 0.5);
    }

    .heartbeat {
      animation: heartbeat 1.4s ease infinite;
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      25% { transform: scale(1.12); }
      40% { transform: scale(1); }
      60% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .floating {
      animation: float 5s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-18px); }
      100% { transform: translateY(0px); }
    }

    .glow-text {
      text-shadow: 0 0 25px #c44b59, 0 0 60px #a02030;
    }

    .particles-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .music-btn {
      position: absolute;
      bottom: 30px;
      right: 30px;
      z-index: 100;
      background: rgba(15, 0, 0, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid #b36b6b;
      color: #f0c0b0;
      padding: 12px 20px;
      border-radius: 40px;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="stage" id="mainStage">
    <!-- particles & global effects dynamically filled -->
    <div class="particles-container" id="particlesContainer"></div>

    <!-- SCENE 1: LOADING -->
    <div class="scene active" id="scene1">
      <div class="glass-card" style="padding: 40px;">
        <div style="font-size: 3rem; margin-bottom: 20px;">✨</div>
        <div class="glow-text" style="font-size: 2rem; font-weight: 400; color: #f5d0c5;">Loading magic...</div>
        <div style="margin-top: 30px; width: 120px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden;">
          <div id="loadingBar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #d4837a, #ffb7a0); box-shadow: 0 0 20px #d44c5c; transition: width 0.3s;"></div>
        </div>
      </div>
    </div>

    <!-- SCENE 2: PASSWORD -->
    <div class="scene" id="scene2">
      <div class="glass-card" style="width: 100%; max-width: 300px;">
        <div style="font-size: 2.5rem; margin-bottom: 20px;">🔐</div>
        <div style="color: #e6b9af; font-size: 1.4rem; margin-bottom: 25px; letter-spacing: 1px;">Secret Key</div>
        <input type="text" id="passwordInput" placeholder="Enter phrase" autocomplete="off" style="margin-bottom: 20px;">
        <button class="btn-luxury" id="unlockBtn">Unlock</button>
        <div id="wrongPopup" style="margin-top: 20px; color: #ffaaaa; opacity: 0; transition: 0.3s;">✨ That's not it, love ✨</div>
      </div>
    </div>

    <!-- SCENE 3: BLACK SCREEN STARS + HAPPY BIRTHDAY -->
    <div class="scene" id="scene3">
      <div style="position: relative; z-index: 20;">
        <div class="heartbeat glow-text" style="font-size: 3.2rem; color: #fadcd9; font-weight: 500; text-shadow: 0 0 70px #c44b59;">Happy Birthday ❤️</div>
      </div>
    </div>

    <!-- SCENE 4: TYPING ANIMATION -->
    <div class="scene" id="scene4">
      <div class="glass-card" style="max-width: 320px;">
        <div id="typingText" style="font-size: 1.6rem; color: #f7ddd4; min-height: 120px; line-height: 1.6;"></div>
      </div>
    </div>

    <!-- SCENE 5: FLOATING HEARTS & MESSAGE -->
    <div class="scene" id="scene5">
      <div class="glass-card">
        <div class="glow-text" style="font-size: 2rem;">🌸 You are magic 🌸</div>
        <div style="color: #e3b2a5; margin-top: 20px; font-style: italic;">the most beautiful soul</div>
      </div>
    </div>

    <!-- SCENE 6: GIFT -->
    <div class="scene" id="scene6">
      <div style="font-size: 5rem; cursor: pointer; transition: 0.3s;" id="giftBox" class="heartbeat">🎁</div>
      <button class="btn-luxury" id="openGiftBtn" style="margin-top: 30px;">✨ Open Gift ✨</button>
    </div>

    <!-- SCENE 7: ENVELOPE -->
    <div class="scene" id="scene7">
      <div style="font-size: 4rem;">✉️</div>
      <div id="letterContent" style="color: #f3cfc0; margin-top: 25px; font-size: 1.2rem; line-height: 1.8;"></div>
    </div>

    <!-- SCENE 8: REASONS -->
    <div class="scene" id="scene8">
      <div id="reasonDisplay" style="color: #fadcd9; font-size: 1.6rem; font-weight: 300; transition: 0.5s;"></div>
    </div>

    <!-- SCENE 9: MEMORY CARDS -->
    <div class="scene" id="scene9">
      <div style="display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;">
        <div class="glass-card" style="width: 100px; height: 130px; display: flex; align-items: center; justify-content: center;">🌙</div>
        <div class="glass-card" style="width: 100px; height: 130px; display: flex; align-items: center; justify-content: center;">✨</div>
        <div class="glass-card" style="width: 100px; height: 130px; display: flex; align-items: center; justify-content: center;">🌹</div>
      </div>
      <div style="color: #dba99a; margin-top: 20px;">our beautiful moments</div>
    </div>

    <!-- SCENE 10: HEART EXPLOSION -->
    <div class="scene" id="scene10">
      <div style="font-size: 5rem;" class="heartbeat">💖</div>
    </div>

    <!-- SCENE 11: LUXURY FINALE -->
    <div class="scene" id="scene11">
      <div class="glow-text heartbeat" style="font-size: 2.8rem; font-weight: 500; color: #ffd9cc; text-shadow: 0 0 90px #b03040;">
        I love you soo soo soooooomuchhhhhhh ❤️
      </div>
    </div>

    <!-- Music button -->
    <button class="music-btn" id="musicControl">▶ Play Music</button>
  </div>

  <script>
    (function() {
      // ---------- VERIFICATION & ROBUST SETUP ----------
      const scenes = {
        scene1: document.getElementById('scene1'),
        scene2: document.getElementById('scene2'),
        scene3: document.getElementById('scene3'),
        scene4: document.getElementById('scene4'),
        scene5: document.getElementById('scene5'),
        scene6: document.getElementById('scene6'),
        scene7: document.getElementById('scene7'),
        scene8: document.getElementById('scene8'),
        scene9: document.getElementById('scene9'),
        scene10: document.getElementById('scene10'),
        scene11: document.getElementById('scene11')
      };

      let currentScene = 'scene1';
      let musicPlaying = false;
      let audioCtx = null;
      let gainNode = null;
      let musicInterval = null;

      // Background music system (oscillator based for reliable demo, easily replaceable)
      function initAudio() {
        if (audioCtx) return;
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          gainNode = audioCtx.createGain();
          gainNode.gain.value = 0.08;
          gainNode.connect(audioCtx.destination);
        } catch (e) {
          console.warn("Audio not supported");
        }
      }

      function startMusic() {
        if (!audioCtx) initAudio();
        if (!audioCtx || musicPlaying) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        // Soft cinematic pad using oscillators
        const now = audioCtx.currentTime;
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        osc1.type = 'sine';
        osc2.type = 'triangle';
        osc1.frequency.value = 196; // G3
        osc2.frequency.value = 246.94; // B3
        const gain1 = audioCtx.createGain();
        gain1.gain.setValueAtTime(0.04, now);
        osc1.connect(gain1).connect(gainNode);
        osc2.connect(gain1);
        osc1.start();
        osc2.start();
        musicPlaying = true;
        document.getElementById('musicControl').textContent = '🎵 Playing';
      }

      function stopMusic() {
        if (audioCtx) {
          audioCtx.close();
          audioCtx = null;
          gainNode = null;
        }
        musicPlaying = false;
        document.getElementById('musicControl').textContent = '▶ Play Music';
      }

      document.getElementById('musicControl').addEventListener('click', (e) => {
        e.stopPropagation();
        if (musicPlaying) {
          stopMusic();
        } else {
          startMusic();
        }
      });

      // scene transition
      function switchScene(sceneId) {
        if (!scenes[sceneId]) return;
        Object.values(scenes).forEach(s => s.classList.remove('active'));
        scenes[sceneId].classList.add('active');
        currentScene = sceneId;
        
        if (sceneId === 'scene3' && !musicPlaying) {
          startMusic();
        }
      }

      // Luxury loading
      setTimeout(() => {
        const bar = document.getElementById('loadingBar');
        if (bar) {
          bar.style.width = '100%';
          setTimeout(() => {
            switchScene('scene2');
          }, 700);
        }
      }, 1500);

      // Password logic
      document.getElementById('unlockBtn').addEventListener('click', () => {
        const input = document.getElementById('passwordInput');
        const val = input.value.trim().toLowerCase();
        if (val === 'i love you') {
          switchScene('scene3');
          setTimeout(() => switchScene('scene4'), 2800);
        } else {
          const popup = document.getElementById('wrongPopup');
          popup.style.opacity = '1';
          setTimeout(() => { popup.style.opacity = '0'; }, 1500);
        }
      });

      // Scene 4 typing
      function startTyping() {
        const el = document.getElementById('typingText');
        if (!el) return;
        const messages = ["Today isn't just another birthday...", "You are one of the most beautiful parts of my life."];
        let msgIndex = 0;
        let charIndex = 0;
        el.innerHTML = '';
        function type() {
          if (msgIndex >= messages.length) {
            setTimeout(() => switchScene('scene5'), 1200);
            return;
          }
          if (charIndex < messages[msgIndex].length) {
            el.innerHTML += messages[msgIndex].charAt(charIndex);
            charIndex++;
            setTimeout(type, 60);
          } else {
            msgIndex++;
            charIndex = 0;
            setTimeout(() => { el.innerHTML += '<br><br>'; type(); }, 800);
          }
        }
        type();
      }

      // Scene transitions chain
      document.getElementById('scene4').addEventListener('transitionstart', function(e) {
        if (currentScene === 'scene4') startTyping();
      });

      setTimeout(() => {
        if (currentScene === 'scene5') {
          setTimeout(() => switchScene('scene6'), 3000);
        }
      }, 100);

      // gift shake & open
      document.getElementById('openGiftBtn').addEventListener('click', () => {
        const gift = document.getElementById('giftBox');
        gift.style.transform = 'rotate(10deg) scale(1.2)';
        setTimeout(() => { gift.style.transform = ''; }, 200);
        launchConfetti();
        setTimeout(() => switchScene('scene7'), 1000);
      });

      function launchConfetti() {
        for (let i=0;i<30;i++) {
          setTimeout(() => {
            const conf = document.createElement('div');
            conf.innerText = '✨';
            conf.style.position = 'absolute';
            conf.style.left = Math.random()*100+'%';
            conf.style.top = '-20px';
            conf.style.fontSize = '1.5rem';
            conf.style.animation = 'float 2s ease-out forwards';
            document.getElementById('particlesContainer').appendChild(conf);
            setTimeout(() => conf.remove(), 2000);
          }, i*20);
        }
      }

      // Envelope letter
      function startLetter() {
        const letter = document.getElementById('letterContent');
        letter.innerHTML = '';
        const lines = ["My dearest,", "Every moment with you", "is a treasure.", "You are light.", "Forever yours."];
        let i=0;
        function addLine() {
          if (i<lines.length) {
            letter.innerHTML += lines[i] + '<br>';
            i++;
            setTimeout(addLine, 800);
          } else {
            setTimeout(() => switchScene('scene8'), 1800);
          }
        }
        addLine();
      }

      document.getElementById('scene7').addEventListener('transitionstart', function(e) {
        if (currentScene === 'scene7') startLetter();
      });

      // Reasons
      const reasons = [
        "Your smile ✨", "Your kindness", "Your laugh", 
        "Your warmth", "Your strength", "Your eyes", 
        "Your voice", "Your heart", "Your soul", "You, just you 🌹"
      ];
      let reasonIdx = 0;
      function showReason() {
        const display = document.getElementById('reasonDisplay');
        if (!display || currentScene !== 'scene8') return;
        if (reasonIdx < reasons.length) {
          display.style.opacity = '0';
          setTimeout(() => {
            display.textContent = reasons[reasonIdx];
            display.style.opacity = '1';
            reasonIdx++;
            setTimeout(showReason, 1300);
          }, 200);
        } else {
          setTimeout(() => switchScene('scene9'), 1000);
        }
      }
      document.getElementById('scene8').addEventListener('transitionstart', function(e) {
        if (currentScene === 'scene8') { reasonIdx=0; showReason(); }
      });

      setTimeout(() => {
        if (currentScene === 'scene9') setTimeout(() => switchScene('scene10'), 2000);
      }, 100);
      setTimeout(() => {
        if (currentScene === 'scene10') setTimeout(() => switchScene('scene11'), 2000);
      }, 100);

      // continuous particles & floating hearts
      function createParticle() {
        const p = document.createElement('div');
        p.innerText = ['❤️','✨','🌹','🕊️','💫'][Math.floor(Math.random()*5)];
        p.style.position = 'absolute';
        p.style.left = Math.random()*100+'%';
        p.style.bottom = '0';
        p.style.fontSize = (Math.random()*20+10)+'px';
        p.style.animation = 'float '+(Math.random()*3+3)+'s ease-in forwards';
        document.getElementById('particlesContainer').appendChild(p);
        setTimeout(() => p.remove(), 4000);
      }
      setInterval(createParticle, 700);

      // initial scene check
      window.addEventListener('load', () => {
        switchScene('scene1');
      });
    })();
  </script>
</body>
</html>
