<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>✨ cinematic birthday · reel of love</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0b0b;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    .scene {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s cubic-bezier(0.23, 1, 0.32, 1), transform 1.2s cubic-bezier(0.23, 1, 0.32, 1);
      transform: scale(0.96) translateY(8px);
      backface-visibility: hidden;
      will-change: transform, opacity;
      padding: 1.5rem;
      text-align: center;
      color: #fff;
      z-index: 1;
    }
    .scene.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1) translateY(0);
      z-index: 10;
    }
    .scene.exit {
      opacity: 0;
      transform: scale(1.02) translateY(-20px);
      pointer-events: none;
      z-index: 5;
    }
    /* ---- glassmorphism base ---- */
    .glass {
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      background: rgba(20, 10, 10, 0.25);
      border: 1px solid rgba(255, 215, 215, 0.12);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      border-radius: 48px;
      padding: 2rem 2.8rem;
    }
    .btn {
      background: rgba(220, 40, 60, 0.2);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid rgba(255, 200, 200, 0.35);
      padding: 1rem 2.8rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 1.4rem;
      letter-spacing: 0.03em;
      color: #fff5f0;
      box-shadow: 0 8px 32px rgba(200, 30, 50, 0.3);
      transition: all 0.3s ease;
      cursor: pointer;
      background: rgba(180, 30, 50, 0.25);
      margin-top: 1.8rem;
    }
    .btn:hover {
      transform: scale(1.03);
      background: rgba(220, 50, 70, 0.4);
      border-color: rgba(255, 180, 180, 0.7);
      box-shadow: 0 0 40px #ff335580;
    }
    .btn:active { transform: scale(0.96); }
    input {
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
      border: 1.5px solid rgba(255, 180, 180, 0.3);
      border-radius: 60px;
      padding: 1rem 2rem;
      font-size: 1.3rem;
      color: #fff5ee;
      text-align: center;
      width: 280px;
      max-width: 80%;
      outline: none;
      transition: 0.3s;
    }
    input:focus {
      border-color: #ff6670;
      box-shadow: 0 0 30px #ff446680;
    }
    .typing-cursor {
      display: inline-block;
      width: 3px;
      height: 1.2em;
      background: #ffa5a5;
      margin-left: 6px;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{ opacity:1; } 50%{ opacity:0.2; } }
    .heartbeat {
      animation: heartbeat 1.8s ease-in-out infinite;
    }
    @keyframes heartbeat { 0%,100%{ transform: scale(1); } 15%{ transform: scale(1.08); } 30%{ transform: scale(1); } 45%{ transform: scale(1.06); } 60%{ transform: scale(1); } }
    .float-particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff, #ff6680);
      opacity: 0.3;
      pointer-events: none;
      filter: blur(2px);
    }
    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #fffbe6;
      box-shadow: 0 0 20px #ffb0b0, 0 0 60px #ff4466;
      border-radius: 50%;
      pointer-events: none;
    }
    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 20px;
      border-radius: 4px;
      opacity: 0.9;
    }
    /* letter */
    .letter-paper {
      background: #fbf3e8;
      color: #1e0e0a;
      padding: 2.2rem 2.8rem;
      border-radius: 24px 8px 24px 8px;
      max-width: 560px;
      width: 90%;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px #f5d9c4 inset;
      transform: rotate(-0.5deg);
      font-family: 'Georgia', serif;
      line-height: 1.6;
      font-size: 1.2rem;
      text-align: left;
    }
    .letter-paper p { margin: 0.8rem 0; }
    /* gift */
    .gift-box {
      width: 180px;
      height: 200px;
      background: linear-gradient(145deg, #b31b2b, #7a0f1a);
      border-radius: 24px 24px 12px 12px;
      box-shadow: 0 20px 60px #aa2233aa, 0 0 80px #ff335580;
      position: relative;
      transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: bottom;
      cursor: pointer;
    }
    .gift-box.shake {
      animation: shake 0.5s ease-in-out 3;
    }
    @keyframes shake {
      0%,100% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(6deg) scale(1.02); }
      75% { transform: rotate(-6deg) scale(1.02); }
    }
    .gift-lid {
      width: 200px;
      height: 40px;
      background: linear-gradient(145deg, #d42a3e, #9e1325);
      border-radius: 20px 20px 0 0;
      position: absolute;
      top: -20px;
      left: -10px;
      box-shadow: 0 -10px 30px #ff4466;
      transition: 0.5s cubic-bezier(0.34, 1.5, 0.64, 1);
      transform-origin: bottom;
    }
    .gift-box.open .gift-lid {
      transform: translateY(-90px) rotate(12deg);
      opacity: 0.6;
    }
    .gift-box.open {
      transform: scale(0.9) rotate(2deg);
      box-shadow: 0 0 120px #ff5570;
    }
    .glow-ring {
      position: absolute;
      inset: -20px;
      border-radius: 40px;
      background: radial-gradient(circle, #ff4470aa, transparent 70%);
      filter: blur(30px);
      opacity: 0.5;
      pointer-events: none;
    }
    /* scene backgrounds */
    #scene1 { background: #0b0b0b; }
    #scene2 { background: radial-gradient(circle at 30% 20%, #2a0a0a, #0d0101); }
    #scene3 { background: radial-gradient(circle at 70% 30%, #2d0505, #0a0000); }
    #scene4 { background: #1a0808; }
    #scene5 { background: #120303; }
    #scene6 { background: #0d0202; }
    #scene7 { background: radial-gradient(circle at 50% 40%, #3b0a12, #0a0000); }
    .big-heart {
      font-size: 10rem;
      filter: drop-shadow(0 0 60px #ff2255);
      animation: heartbeat 1.8s ease-in-out infinite;
    }
    .letter-line {
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .letter-line.show {
      opacity: 1;
      transform: translateY(0);
    }
    .password-box {
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      padding: 2.5rem 2rem;
      border-radius: 60px;
      border: 1px solid #ff4466aa;
      box-shadow: 0 0 80px #ff335530;
    }
    .lock-icon {
      font-size: 3.4rem;
      filter: drop-shadow(0 0 30px #ff4466);
    }
    .final-text {
      font-size: clamp(2.6rem, 12vw, 5.5rem);
      font-weight: 600;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #ffe3e0, #ffa5a5, #ff7080);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 60px #ff3355aa;
      animation: glowPulse 3s infinite alternate;
    }
    @keyframes glowPulse { 0%{ filter: drop-shadow(0 0 20px #ff3355); } 100%{ filter: drop-shadow(0 0 80px #ff6680); } }
    .sub-glow {
      color: #ffe5e0;
      text-shadow: 0 0 40px #ff4466;
    }
    .particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>

<canvas id="particleCanvas" class="particle-canvas"></canvas>

<!-- scenes -->
<div id="scene1" class="scene active">
  <div style="position:relative; z-index:2;">
    <h1 style="font-size: clamp(3rem, 12vw, 6rem); font-weight: 300; letter-spacing: 6px; opacity:0; animation: fadeIn 2.4s ease forwards; text-shadow: 0 0 60px #ff4d6d;">Happy Birthday ❤️</h1>
  </div>
</div>

<div id="scene2" class="scene">
  <div class="glass" style="max-width:680px; padding:2.8rem 2rem;">
    <div style="font-size:2.2rem; font-weight:300; line-height:1.5; letter-spacing:0.02em;">
      <span id="typeLine1" style="display:inline-block;"></span><span class="typing-cursor" id="cursor1"></span>
      <div style="height:1.2rem;"></div>
      <span id="typeLine2" style="display:inline-block;"></span><span class="typing-cursor" id="cursor2" style="display:none;"></span>
    </div>
  </div>
</div>

<div id="scene3" class="scene">
  <div style="display:flex; flex-direction:column; align-items:center;">
    <div class="gift-box" id="giftBox">
      <div class="glow-ring"></div>
      <div class="gift-lid"></div>
      <div style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:gold; width:30px; height:12px; border-radius:20px; box-shadow:0 0 30px #ffbb33;"></div>
      <div style="position:absolute; top:40px; left:50%; transform:translateX(-50%); width:12px; height:60px; background:gold; box-shadow:0 0 20px #ffbb33;"></div>
    </div>
    <button class="btn" id="openGiftBtn" style="margin-top:2.8rem;">🎁 Open Gift</button>
  </div>
</div>

<div id="scene4" class="scene">
  <div class="letter-paper" id="letterPaper">
    <p style="font-weight:600; font-size:1.5rem; color:#b02a3a;">My Dearest,</p>
    <p id="letterLine1" class="letter-line">Every day with you is a beautiful page.</p>
    <p id="letterLine2" class="letter-line">Today, the world celebrates your light.</p>
    <p id="letterLine3" class="letter-line">You are the poetry my heart keeps writing.</p>
    <p id="letterLine4" class="letter-line" style="font-style:italic; color:#a0364a;">— forever yours,</p>
  </div>
</div>

<div id="scene5" class="scene">
  <div style="display:flex; flex-direction:column; align-items:center;">
    <div class="big-heart">❤️</div>
    <div style="margin-top:1.5rem; font-size:1.8rem; font-weight:300; letter-spacing:2px; background:rgba(0,0,0,0.4); padding:0.8rem 2rem; border-radius:60px; backdrop-filter:blur(8px);">
      <span id="wishText" style="display:inline-block;">✨</span>
    </div>
  </div>
</div>

<div id="scene6" class="scene">
  <div class="password-box">
    <div class="lock-icon">🔐</div>
    <h3 style="font-weight:300; margin:0.8rem 0 1.2rem; letter-spacing:1px;">enter the secret</h3>
    <input type="text" id="passwordInput" placeholder="type here..." autocomplete="off">
    <button class="btn" id="unlockBtn" style="margin-top:1.8rem;">Unlock ❤️</button>
    <p id="lockMsg" style="margin-top:1.2rem; min-height:2rem; font-weight:300; color:#ffb0b0;"></p>
  </div>
</div>

<div id="scene7" class="scene">
  <div style="position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%;">
    <div style="position:absolute; inset:0; background: radial-gradient(circle at 30% 40%, #ff446622, transparent 60%);"></div>
    <div class="final-text" style="position:relative; z-index:4;">I love you sooo sooo sooooo much ❤️</div>
    <div style="margin-top:2rem; font-size:1.6rem; opacity:0.8; letter-spacing:6px; filter:drop-shadow(0 0 40px #ff4466);">✨ always & forever ✨</div>
  </div>
</div>

<script>
  (function(){
    // ----- particle system (subtle) -----
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    function resize() { width=canvas.width=window.innerWidth; height=canvas.height=window.innerHeight; }
    window.addEventListener('resize', resize);
    resize();
    const particles = [];
    for(let i=0;i<60;i++){
      particles.push({
        x: Math.random()*width, y: Math.random()*height,
        r: Math.random()*3+1.2, dx: (Math.random()-0.5)*0.4, dy: (Math.random()-0.5)*0.4,
        o: Math.random()*0.4+0.1
      });
    }
    function drawParticles() {
      ctx.clearRect(0,0,width,height);
      particles.forEach(p=>{
        p.x+=p.dx; p.y+=p.dy;
        if(p.x<0||p.x>width) p.dx*=-1;
        if(p.y<0||p.y>height) p.dy*=-1;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle = `rgba(255, 200, 210, ${p.o})`;
        ctx.shadowColor = '#ff4466';
        ctx.shadowBlur = 20;
        ctx.fill();
      });
      requestAnimationFrame(drawParticles);
    }
    drawParticles();

    // ----- scene management -----
    const scenes = document.querySelectorAll('.scene');
    let currentScene = 0;
    let isTransitioning = false;
    let sceneTimers = [];

    function goToScene(index) {
      if (isTransitioning || index === currentScene) return;
      isTransitioning = true;
      const prev = scenes[currentScene];
      const next = scenes[index];
      prev.classList.remove('active');
      prev.classList.add('exit');
      setTimeout(()=>{ prev.classList.remove('exit'); }, 1300);
      next.classList.remove('exit');
      next.classList.add('active');
      currentScene = index;
      setTimeout(()=>{ isTransitioning = false; }, 1200);
      // trigger scene logic
      if (index===4) showLetterLines();
      if (index===5) animateWishes();
      if (index===6) { /* password init */ }
      if (index===7) { triggerFinalSparkles(); }
    }

    // ----- scene 1 auto to 2 -----
    setTimeout(()=>{ goToScene(1); }, 4000);

    // ----- scene 2 typing -----
    const line1 = "Today isn’t just another day…";
    const line2 = "You were born to make someone’s world beautiful.";
    let typeIndex1=0, typeIndex2=0;
    let typeDone1=false, typeDone2=false;
    function typeScene2() {
      const el1 = document.getElementById('typeLine1');
      const el2 = document.getElementById('typeLine2');
      const cursor1 = document.getElementById('cursor1');
      const cursor2 = document.getElementById('cursor2');
      if(!typeDone1) {
        if(typeIndex1 < line1.length) {
          el1.textContent += line1[typeIndex1++];
          setTimeout(typeScene2, 60);
        } else {
          typeDone1=true;
          cursor1.style.display='none';
          cursor2.style.display='inline-block';
          setTimeout(typeScene2, 400);
        }
      } else if(!typeDone2) {
        if(typeIndex2 < line2.length) {
          el2.textContent += line2[typeIndex2++];
          setTimeout(typeScene2, 50);
        } else {
          typeDone2=true;
          cursor2.style.display='none';
          setTimeout(()=>{ goToScene(2); }, 1200);
        }
      }
    }
    // start typing when scene2 active (listener)
    const scene2Observer = new MutationObserver(()=>{
      if(scenes[1].classList.contains('active') && !typeDone1) {
        typeScene2();
        scene2Observer.disconnect();
      }
    });
    scene2Observer.observe(scenes[1], { attributes: true, attributeFilter: ['class'] });

    // scene2 -> scene3 after typing (called inside)
    // but we go to scene3 when typing done: setTimeout(()=>{ goToScene(2); }, 1200); maps to scene index 2 (gift)

    // ----- scene3 gift -----
    const giftBox = document.getElementById('giftBox');
    const openBtn = document.getElementById('openGiftBtn');
    let giftOpened = false;
    openBtn.addEventListener('click', ()=>{
      if(giftOpened) return;
      giftOpened = true;
      giftBox.classList.add('shake');
      setTimeout(()=>{
        giftBox.classList.remove('shake');
        giftBox.classList.add('open');
        // confetti burst
        for(let i=0;i<80;i++) {
          const c = document.createElement('div');
          c.className = 'confetti-piece';
          c.style.left = (40+Math.random()*20)+'%';
          c.style.top = (30+Math.random()*30)+'%';
          c.style.background = `hsl(${Math.random()*360}, 80%, 70%)`;
          c.style.transform = `rotate(${Math.random()*360}deg)`;
          c.style.position = 'fixed';
          c.style.zIndex = '99';
          c.style.pointerEvents = 'none';
          c.style.transition = 'all 2.5s cubic-bezier(0.23,1,0.32,1)';
          document.body.appendChild(c);
          requestAnimationFrame(()=>{
            c.style.transform = `translate(${(Math.random()-0.5)*400}px, ${(Math.random()-0.5)*400}px) rotate(${Math.random()*720}deg)`;
            c.style.opacity = '0';
          });
          setTimeout(()=> c.remove(), 3000);
        }
        setTimeout(()=>{ goToScene(3); }, 1600);
      }, 800);
    });

    // scene4 letter lines
    function showLetterLines() {
      const lines = document.querySelectorAll('.letter-line');
      lines.forEach((el,i)=>{
        setTimeout(()=>{ el.classList.add('show'); }, i*400+300);
      });
      setTimeout(()=>{ goToScene(4); }, 3000);
    }

    // scene5 wishes
    const wishes = ["You are magic ✨", "Beautiful soul ❤️", "Forever loved", "My sunshine", "Endless joy", "You complete me"];
    let wishIndex=0;
    function animateWishes() {
      const el = document.getElementById('wishText');
      if(wishIndex < wishes.length) {
        el.style.opacity='0';
        el.style.transform='scale(0.7)';
        setTimeout(()=>{
          el.textContent = wishes[wishIndex++];
          el.style.transition='all 0.6s cubic-bezier(0.34,1.56,0.64,1)';
          el.style.opacity='1';
          el.style.transform='scale(1)';
          setTimeout(animateWishes, 1300);
        }, 200);
      } else {
        setTimeout(()=>{ goToScene(5); }, 1000);
      }
    }

    // scene6 password
    document.getElementById('unlockBtn').addEventListener('click', ()=>{
      const input = document.getElementById('passwordInput');
      const msg = document.getElementById('lockMsg');
      if(input.value.trim().toLowerCase() === 'i love you') {
        msg.style.color = '#9bff9b';
        msg.textContent = '❤️ perfect ❤️';
        setTimeout(()=>{ goToScene(6); }, 1000);
      } else {
        msg.style.color = '#ff8888';
        msg.textContent = '💔 try again, love 💔';
        setTimeout(()=>{ msg.textContent=''; }, 1800);
      }
    });
    document.getElementById('passwordInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter') document.getElementById('unlockBtn').click(); });

    // scene7 final sparkles
    function triggerFinalSparkles() {
      for(let i=0;i<50;i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.style.left = (Math.random()*100)+'%';
        s.style.top = (Math.random()*100)+'%';
        s.style.width = (Math.random()*8+2)+'px';
        s.style.height = s.style.width;
        s.style.background = `radial-gradient(circle, #fff, #ff7799)`;
        s.style.position = 'fixed';
        s.style.zIndex = '50';
        s.style.pointerEvents = 'none';
        s.style.animation = `sparkleAnim ${Math.random()*2+2}s ease-in-out infinite`;
        document.body.appendChild(s);
        setTimeout(()=> s.remove(), 4000);
      }
    }
    // inject sparkle keyframe
    const styleSheet = document.createElement("style");
    styleSheet.textContent = `@keyframes sparkleAnim { 0%{ opacity:0; transform:scale(0) rotate(0deg); } 50%{ opacity:1; transform:scale(1.8) rotate(180deg); } 100%{ opacity:0; transform:scale(0) rotate(360deg); } }`;
    document.head.appendChild(styleSheet);

    // auto advance from scene4->5, scene5->6, scene6->7 are called inside
    // but we want scene4->5 after letter done: goToScene(4) called in showLetterLines
    // scene5->6 after wishes done: goToScene(5)
    // scene6->7 after password correct: goToScene(6)
    // scene7 is final.

    // scene1 -> scene2 is timer; scene2 -> scene3 is after typing; scene3 -> scene4 after gift open; scene4->5 after letter; scene5->6 after wishes; scene6->7 after password.
    // we also need to trigger scene2 typing if already active (in case)
    window.addEventListener('load', ()=>{
      // ensure scene1 active
      scenes.forEach((s,i)=>{ if(i===0) s.classList.add('active'); else s.classList.remove('active'); });
    });

    // extra: floating hearts in scene2,3,5,6,7 via css pseudo? we add some floating divs with js
    function createFloatingHearts() {
      setInterval(()=>{
        const scene = scenes[currentScene];
        if(!scene) return;
        const heart = document.createElement('div');
        heart.textContent = '❤️';
        heart.style.position = 'fixed';
        heart.style.left = (Math.random()*90+5)+'%';
        heart.style.bottom = '-10%';
        heart.style.fontSize = (Math.random()*30+20)+'px';
        heart.style.opacity = (Math.random()*0.3+0.1);
        heart.style.pointerEvents = 'none';
        heart.style.zIndex = '2';
        heart.style.transition = 'all 6s linear';
        document.body.appendChild(heart);
        requestAnimationFrame(()=>{
          heart.style.transform = `translateY(-${window.innerHeight+100}px) rotate(${Math.random()*40-20}deg)`;
          heart.style.opacity = '0';
        });
        setTimeout(()=> heart.remove(), 7000);
      }, 900);
    }
    createFloatingHearts();

    // also subtle glow pulse on scene2 etc
  })();
</script>
</body>
</html>
